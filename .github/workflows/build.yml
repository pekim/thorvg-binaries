name: build
on:
  push:

permissions:
  contents: read

jobs:
  linux-amd64:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: install meson
        run: sudo apt-get install python3 ninja-build meson

      - name: build
        run: ./build.sh

  macos:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-15]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: install clang
        run: brew install llvm

      - name: install meson
        run: brew install meson ninja

      - name: build
        run: ./build.sh
        env:
          CC: /opt/homebrew/opt/llvm/bin/clang
          CXX: /opt/homebrew/opt/llvm/bin/clang++
