name: build
on:
  push:

permissions:
  contents: read

env:
  GO_VERSION: 1.25

jobs:
  linux-amd64:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: install meson
        run: sudo apt-get install python3 ninja-build meson

      - name: build
        run: ./build.sh

