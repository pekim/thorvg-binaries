name: build
on:
  push:

permissions:
  contents: read

env:
  GO_VERSION: 1.25

jobs:
  linux-amd64:
    runs-on: ubuntu-24.04

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: install meson
        run: sudo apt-get install python3 ninja-build meson

      - name: build
        run: ./build.sh

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}
          path: assets/*
          overwrite: true

  macos-amd64:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: install clang
        run: brew install llvm

      - name: install meson
        run: brew install meson ninja

      - name: build
        run: ./build.sh
        env:
          CC: /usr/local/opt/llvm/bin/clang
          CXX: /usr/local/opt/llvm/bin/clang++

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}
          path: assets/*
          overwrite: true

  macos-arm64:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "${{ env.GO_VERSION }}"

      - name: install clang
        run: brew install llvm

      - name: install meson
        run: brew install meson ninja

      - name: build
        run: ./build.sh
        env:
          CC: /opt/homebrew/opt/llvm/bin/clang
          CXX: /opt/homebrew/opt/llvm/bin/clang++

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}
          path: assets/*
          overwrite: true
