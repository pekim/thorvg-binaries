name: build
on:
  push:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: install meson
        run: sudo apt-get install python3 ninja-build meson

      - name: build
        run: ./build.sh
